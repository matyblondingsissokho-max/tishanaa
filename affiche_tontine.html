<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tontine Journée - Annonce</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .poster {
            width: 100%;
            max-width: 800px;
            background: linear-gradient(135deg, #0f3460 0%, #16213e 50%, #1a1a2e 100%);
            border-radius: 30px;
            padding: 60px 50px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .poster::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 193, 7, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        .poster::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(76, 201, 240, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 5s ease-in-out infinite reverse;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
            z-index: 2;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #ffc107 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 15px;
            text-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
            animation: slideDown 0.8s ease-out 0.2s backwards;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            color: #4cc9f0;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: slideDown 0.8s ease-out 0.4s backwards;
        }

        .divider {
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            margin: 30px auto;
            border-radius: 2px;
            animation: expandWidth 1s ease-out 0.6s backwards;
        }

        @keyframes expandWidth {
            from {
                width: 0;
            }
            to {
                width: 120px;
            }
        }

        .content {
            position: relative;
            z-index: 2;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            animation: slideUp 0.8s ease-out backwards;
        }

        .info-card:nth-child(1) { animation-delay: 0.7s; }
        .info-card:nth-child(2) { animation-delay: 0.8s; }
        .info-card:nth-child(3) { animation-delay: 0.9s; }
        .info-card:nth-child(4) { animation-delay: 1s; }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 215, 0, 0.4);
            background: rgba(255, 215, 0, 0.08);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        .info-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #ffd700, #4cc9f0);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .info-card:hover::before {
            transform: scaleX(1);
        }

        .info-label {
            font-size: 14px;
            color: #4cc9f0;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .info-value {
            font-size: 32px;
            color: #ffffff;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
        }

        .info-value.highlight {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 36px;
        }

        .special-info {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15) 0%, rgba(76, 201, 240, 0.15) 100%);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 35px;
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.8s ease-out 1.1s backwards;
        }

        .special-info::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ffd700, #4cc9f0, #ffd700);
            border-radius: 20px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .special-info:hover::before {
            opacity: 0.3;
            animation: borderGlow 2s linear infinite;
        }

        @keyframes borderGlow {
            0%, 100% {
                filter: hue-rotate(0deg);
            }
            50% {
                filter: hue-rotate(30deg);
            }
        }

        .special-label {
            font-size: 16px;
            color: #4cc9f0;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .special-value {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .footer {
            text-align: center;
            position: relative;
            z-index: 2;
            animation: fadeIn 1s ease-out 1.3s backwards;
        }

        .cta {
            background: linear-gradient(135deg, #ffd700 0%, #ffc107 100%);
            color: #16213e;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            letter-spacing: 3px;
            padding: 20px 50px;
            border: none;
            border-radius: 50px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
            display: inline-block;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }

        .cta::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .cta:hover::before {
            width: 300px;
            height: 300px;
        }

        .cta:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.6);
        }

        .cta span {
            position: relative;
            z-index: 1;
        }

        .pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0.03;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255, 255, 255, 0.5) 35px, rgba(255, 255, 255, 0.5) 70px);
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .poster {
                padding: 40px 30px;
            }

            .title {
                font-size: 48px;
            }

            .subtitle {
                font-size: 20px;
            }

            .info-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .info-value {
                font-size: 28px;
            }

            .special-value {
                font-size: 36px;
            }

            .cta {
                font-size: 24px;
                padding: 18px 40px;
            }
        }

        .shine {
            animation: shine 3s ease-in-out infinite;
        }

        @keyframes shine {
            0%, 100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.2);
            }
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="pattern"></div>
        
        <div style="position: absolute; top: 20px; left: 20px; z-index: 10;">
            <a href="index.html" style="display: inline-block; padding: 12px 24px; background: rgba(255, 255, 255, 0.9); color: #16213e; text-decoration: none; border-radius: 50px; font-weight: 700; font-size: 14px; transition: all 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">← Accueil</a>
        </div>
        
        <div class="header">
            <h1 class="title shine">TONTINE</h1>
            <p class="subtitle">Journée Solidaire</p>
            <div class="divider"></div>
        </div>

        <div class="content">
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-label">Cotisation</div>
                    <div class="info-value highlight">50 000 Fr</div>
                </div>

                <div class="info-card">
                    <div class="info-label">Date de Paiement</div>
                    <div class="info-value">chaque 1 mois</div>
                </div>

                <div class="info-card">
                    <div class="info-label">Durée</div>
                    <div class="info-value">10 mois</div>
                </div>

                <div class="info-card">
                    <div class="info-label">Participants</div>
                    <div class="info-value highlight">11 Personnes</div>
                </div>
            </div>

            <div class="special-info">
                <div class="special-label">Tegui (Tour Complet)</div>
                <div class="special-value">500 000 Fr</div>
            </div>
        </div>

        <div class="footer">
            <a href="inscription.html" class="cta" style="text-decoration: none;">
                <span>Rejoignez-Nous !</span>
            </a>
        </div>
    </div>

    <script>
        // Effet de parallaxe léger sur les cartes
        document.querySelectorAll('.info-card').forEach(card => {
            card.addEventListener('mousemove', function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = (y - centerY) / 20;
                const rotateY = (centerX - x) / 20;
                
                this.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-5px)`;
            });
            
            card.addEventListener('mouseleave', function() {
                this.style.transform = '';
            });
        });
    </script>
</body>
</html>
